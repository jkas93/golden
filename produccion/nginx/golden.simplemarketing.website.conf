# =============================================================================
# Nginx Config — Frontend (Next.js)
# Dominio: golden.simplemarketing.website
# Archivo: /etc/nginx/sites-available/golden.simplemarketing.website.conf
# =============================================================================

server {
    listen 80;
    server_name golden.simplemarketing.website;

    # Nginx añadirá automáticamente la redirección a HTTPS
    # después de ejecutar certbot --nginx

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (necesario para Next.js HMR en dev, y algunas features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Archivos estáticos de Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_bypass $http_upgrade;
        # Cachear assets estáticos por 30 días
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Logs
    access_log /var/log/nginx/golden.access.log;
    error_log  /var/log/nginx/golden.error.log;
}
