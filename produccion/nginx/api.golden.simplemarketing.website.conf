# =============================================================================
# Nginx Config — Backend (NestJS API)
# Dominio: api.golden.simplemarketing.website
# Archivo: /etc/nginx/sites-available/api.golden.simplemarketing.website.conf
# =============================================================================

server {
    listen 80;
    server_name api.golden.simplemarketing.website;

    # Nginx añadirá automáticamente la redirección a HTTPS
    # después de ejecutar certbot --nginx

    # Límite de tamaño para requests (útil si hay subida de archivos)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;

        # Headers estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (por si la API lo necesita en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
    }

    # Logs
    access_log /var/log/nginx/api-golden.access.log;
    error_log  /var/log/nginx/api-golden.error.log;
}
